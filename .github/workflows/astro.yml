name: Astro - GitHub Pages

on:
  push:
    branches: [main, master]

  workflow_dispatch:

env:
  HUSKY: 0

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "astro"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v7

      - name: Astro Build & Deploy
        uses: withastro/action@v6
        with:
          path: .
          #node-version: 24
          package-manager: bun@latest
          #build-cmd: bun run build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages deployment
        id: deployment
        uses: actions/deploy-pages@v5
